<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Vault Challenge</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0c10;
        }
    </style>
</head>
<body class="text-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-zinc-950 border border-zinc-800 rounded-2xl p-8 shadow-2xl space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-amber-500">
                SECURE VAULT
            </h1>
            <p class="text-zinc-500 mt-2 text-sm">
                No hints. No clues. Decryption keys are mathematically protected. Enter the correct credential sequence to authorize access.
            </p>
        </div>

        <div class="space-y-4">
            <div>
                <label for="password-input" class="block text-xs font-semibold text-zinc-400 uppercase tracking-wider mb-2">Access Key</label>
                <input type="text" id="password-input" placeholder="Enter security key..." 
                       class="w-full px-4 py-3 bg-zinc-900 border border-zinc-800 rounded-lg focus:outline-none focus:border-red-500 text-zinc-200 placeholder-zinc-700 transition-colors font-mono text-sm">
            </div>

            <button id="submit-btn" 
                    class="w-full py-3 px-4 bg-gradient-to-r from-red-600 to-amber-600 hover:from-red-700 hover:to-amber-700 text-white font-medium rounded-lg transition-all shadow-lg shadow-red-900/20 active:scale-[0.98]">
                Decrypt Vault
            </button>
        </div>

        <div id="feedback-box" class="hidden p-4 rounded-lg border text-center text-sm font-medium font-mono">
            <!-- Dynamic validation feedback goes here -->
        </div>
    </div>

    <script>
        // Your secure SHA-256 hash
        const CORRECT_HASH = "a3ff7dd3fbc5fbb14e72b57d804556f90afbec3f6c515b8ef3d9897e37cc8e5f";

        // Helper function to hash user input on the fly
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const input = document.getElementById('password-input').value.trim();
            const feedbackBox = document.getElementById('feedback-box');

            if (!input) {
                showFeedback("INPUT SEQUENCE REQUIRED", "warning");
                return;
            }

            try {
                // Hash the user's input
                const inputHash = await sha256(input);

                // Compare the user's hash with our stored hash
                if (inputHash === CORRECT_HASH) {
                    showFeedback("🎉 ACCESS GRANTED. CREDENTIAL SEQUENCE VERIFIED.", "success");
                } else {
                    showFeedback("❌ ACCESS DENIED. INVALID SEQUENCE.", "error");
                }
            } catch (e) {
                showFeedback("SYSTEM ERROR: CRITICAL DECRYPTION FAILURE.", "error");
            }
        });

        function showFeedback(message, type) {
            const box = document.getElementById('feedback-box');
            box.classList.remove('hidden', 'bg-emerald-950/30', 'border-emerald-800', 'text-emerald-400', 'bg-red-950/30', 'border-red-900', 'text-red-400', 'bg-amber-950/30', 'border-amber-800', 'text-amber-400');
            
            if (type === 'success') {
                box.classList.add('bg-emerald-950/30', 'border-emerald-800', 'text-emerald-400');
            } else if (type === 'error') {
                box.classList.add('bg-red-950/30', 'border-red-900', 'text-red-400');
            } else {
                box.classList.add('bg-amber-950/30', 'border-amber-800', 'text-amber-400');
            }
            
            box.textContent = message;
            box.classList.remove('hidden');
        }
    </script>
</body>
</html>
