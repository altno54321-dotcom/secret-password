<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wisterian Challenge</title>
    <!-- Tailwind CSS for modern look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d0e15;
        }
    </style>
</head>
<body class="text-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-400">
                The Wisterian Challenge
            </h1>
            <p class="text-slate-400 mt-2 text-sm">
                A password is hidden within this website. Find it to claim your prize of <span class="text-yellow-400 font-semibold">200 Wisterian Bucks</span>!
            </p>
        </div>

        <div class="space-y-4">
            <div>
                <label for="password-input" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Enter Password</label>
                <input type="text" id="password-input" placeholder="Type password here..." 
                       class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg focus:outline-none focus:border-indigo-500 text-slate-200 placeholder-slate-600 transition-colors">
            </div>

            <button id="submit-btn" 
                    class="w-full py-3 px-4 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-medium rounded-lg transition-all shadow-lg shadow-indigo-500/20 active:scale-[0.98]">
                Submit Attempt
            </button>
        </div>

        <div id="feedback-box" class="hidden p-4 rounded-lg border text-center text-sm font-medium">
            <!-- Feedback message updates here -->
        </div>

        <div class="text-center text-xs text-slate-500">
            <p>Inspect the source code or check the GitHub repository to find clues.</p>
        </div>
    </div>

    <!-- 
      Puzzled? Here is a hint for curious minds:
      The validation script reconstructs the password from a reversed Base64 string.
      Can you reverse the decoding pipeline?
    -->
    <script>
        // Your clean, safe, backslash-free hash
        const SECRET_HASH = "u4iLg0iLtAiLt4SLg0iLuAiLu4SLg8CIu0CIt4CIu4CIu0iLg4CItAiLu4CIu4CIt0iLg8CIt0SLt0CIt0SLt0CIt0SLu4CIvASLt4SLg0SLtASLt0iLg4SLg4CZy92dzNXYwVGa0R3bnV3b5NHdhJ3Zu92Y";

        document.getElementById('submit-btn').addEventListener('click', () => {
            const input = document.getElementById('password-input').value.trim();
            const feedbackBox = document.getElementById('feedback-box');

            if (!input) {
                showFeedback("Please enter a password first.", "warning");
                return;
            }

            try {
                // To verify the password, we reverse the hash and decode it from Base64
                const unreversed = SECRET_HASH.split('').reverse().join('');
                const correctPassword = atob(unreversed);

                if (input === correctPassword) {
                    showFeedback("🎉 Correct! You solved the challenge! Take a screenshot to claim your 200 Wisterian Bucks!", "success");
                } else {
                    showFeedback("❌ Incorrect password. Keep searching!", "error");
                }
            } catch (e) {
                showFeedback("An error occurred during verification. Check your configuration.", "error");
            }
        });

        function showFeedback(message, type) {
            const box = document.getElementById('feedback-box');
            box.classList.remove('hidden', 'bg-emerald-950/50', 'border-emerald-800', 'text-emerald-400', 'bg-rose-950/50', 'border-rose-800', 'text-rose-400', 'bg-amber-950/50', 'border-amber-800', 'text-amber-400');
            
            if (type === 'success') {
                box.classList.add('bg-emerald-950/50', 'border-emerald-800', 'text-emerald-400');
            } else if (type === 'error') {
                box.classList.add('bg-rose-950/50', 'border-rose-800', 'text-rose-400');
            } else {
                box.classList.add('bg-amber-950/50', 'border-amber-800', 'text-amber-400');
            }
            
            box.textContent = message;
            box.classList.remove('hidden');
        }
    </script>
</body>
</html>
